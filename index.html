<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="description" content="DSAMantra — Master DSA. Build Intuition. Land FAANG. Track problems, follow the FAANG roadmap, and build real interview intuition.">
  <meta name="author" content="Sham Kamble">
  <meta name="application-name" content="DSAMantra">
  <meta name="theme-color" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-orientations" content="portrait">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DSAMantra">
  <meta property="og:title" content="DSAMantra">
  <meta property="og:description" content="Master DSA. Build Intuition. Land FAANG.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="DSAMantra">
  <meta name="twitter:description" content="Master DSA. Build Intuition. Land FAANG.">
  <title>DSAMantra</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="css/main.css">
  <script>
    (function () {
      try {
        var theme = sessionStorage.getItem('dsa-theme');
        if (theme === 'dark' || theme === 'light') {
          document.documentElement.setAttribute('data-theme', theme);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="app" class="app">
    <aside id="sidebar" class="sidebar" aria-label="Main navigation"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

    <div class="main-wrapper">
      <header id="navbar" class="navbar" role="banner"></header>
      <main id="content" class="content" role="main"></main>
      <footer class="app-footer" id="app-footer" aria-label="Site footer">
        <div class="app-footer__inner">
          <div class="app-footer__brand">
            <span class="app-footer__logo" aria-hidden="true"></span>
            <span class="app-footer__name">DSAMantra</span>
          </div>
          <p class="app-footer__tagline">Master DSA. Build Intuition. Land FAANG.</p>
          <p class="app-footer__credit">DSAMantra by Sham Kamble</p>
        </div>
      </footer>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
